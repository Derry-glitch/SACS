name: sacs_mobile
description: Smart Academic Companion System (SACS) Flutter mobile application.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  dio: ^5.4.3
  go_router: ^14.2.1
  flutter_secure_storage: ^9.2.2
  intl: ^0.19.0
  file_picker: ^8.0.3
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.3
  qr_flutter: ^4.1.0
  local_auth: ^2.2.0
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
